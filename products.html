<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bonoeco - Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-neutral-950 text-neutral-100">

  <!-- Header with Navigation -->
  <header class="p-6 border-b border-neutral-800 flex items-center justify-between">
    <img src="img/logob.png" alt="Bonoeco Logo" class="w-20 h-auto" />
    <nav>
      <ul class="flex space-x-6">
        <li><a href="index.html" class="text-sm text-neutral-400 hover:text-white">Home</a></li>
        <li><a href="product.html" class="text-sm text-neutral-400 hover:text-white">Products</a></li>
        <li><a href="contact.html" class="text-sm text-neutral-400 hover:text-white">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Product Section -->
  <section class="max-w-6xl mx-auto py-16 px-6 grid md:grid-cols-2 gap-12">

    <!-- Product Image -->
    <div class="aspect-square bg-neutral-900 flex items-center justify-center">
      <img src="img/glove1.jpg" class="object-contain max-h-full">
    </div>

    <!-- Product Info -->
    <div>
      <h1 class="text-3xl mb-4">Infield Glove</h1>
      <p class="text-neutral-400 mb-6">Crafted from premium North American Kip leather, designed for fast transfer and precision control.</p>

      <div class="mb-4">
        <p class="text-sm text-neutral-500">Size</p>
        <p>11.5"</p>
      </div>

      <div class="mb-6">
        <p class="text-sm text-neutral-500">Material</p>
        <p>Kip Leather</p>
      </div>

      <!-- Contact Button -->
      <button class="bg-white text-black px-6 py-3 w-full hover:bg-neutral-300">
        Contact for Purchase
      </button>
    </div>

  </section>

</body>
</html>
