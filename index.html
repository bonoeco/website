<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bonoeco - Baseball Gloves</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100">

  <!-- Header with Navigation -->
  <header class="p-6 border-b border-neutral-800 flex items-center justify-between">
    <img src="img/logob.png" alt="Bonoeco Logo" class="w-20 h-auto" />
    <nav>
      <ul class="flex space-x-6">
        <li><a href="index.html" class="text-sm text-neutral-400 hover:text-white">Home</a></li>
        <li><a href="product.html" class="text-sm text-neutral-400 hover:text-white">Products</a></li>
        <li><a href="contact.html" class="text-sm text-neutral-400 hover:text-white">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="relative py-32 px-6 text-center">
    <img src="img/hero.jpg" class="absolute inset-0 w-full h-full object-cover opacity-40">
    <div class="relative">
      <h2 class="text-4xl md:text-6xl font-light mb-6">Crafted from North American Steer</h2>
      <p class="text-neutral-300 max-w-xl mx-auto">
        Premium baseball gloves built for serious players who demand performance, durability, and precision.
      </p>
    </div>
  </section>

  <!-- Products Section -->
  <section id="products" class="py-16 px-6 max-w-6xl mx-auto">
    <h3 class="text-2xl mb-10">Our Products</h3>
    <div class="grid md:grid-cols-3 gap-8">
      <div class="border border-neutral-800 p-4">
        <a href="product.html">
          <img src="img/glove1.jpg" class="w-full h-48 object-contain mb-4" />
          <h4 class="text-lg font-semibold">Infield Glove</h4>
          <p class="text-sm text-neutral-400">11.5" Kip Leather</p>
        </a>
      </div>
      <div class="border border-neutral-800 p-4">
        <a href="product.html">
          <img src="img/glove2.jpg" class="w-full h-48 object-contain mb-4" />
          <h4 class="text-lg font-semibold">Outfield Glove</h4>
          <p class="text-sm text-neutral-400">12.75" Steerhide</p>
        </a>
      </div>
      <div class="border border-neutral-800 p-4">
        <a href="product.html">
          <img src="img/glove3.jpg" class="w-full h-48 object-contain mb-4" />
          <h4 class="text-lg font-semibold">Pitcher Glove</h4>
          <p class="text-sm text-neutral-400">12" Steerhide</p>
        </a>
      </div>
    </div>
  </section>

</body>
</html>
